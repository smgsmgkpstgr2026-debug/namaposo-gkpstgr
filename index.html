                    };

                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupObject));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", "BACKUP_SYSTEM_GKPS_" + new Date().toISOString().slice(0,10) + ".json");
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();

                    alert("Backup berhasil di-download!");
                } catch (error) {
                    console.error(error);
                    alert("Gagal melakukan backup: " + error.message);
                } finally {
                    setImporting(false); setImportProgress("");
                }
            };

            const downloadQR = async (p) => {
                try {
                    const res = await fetch(`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${p.regNum}`);
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `QR_${p.name}_${p.regNum}.png`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                } catch (err) { alert("Gagal download."); }
            };

            const displayedParticipants = React.useMemo(() => {
                if (liveTab === 'present') {
                    return participants.filter(p => p.checkedIn);
                } else {
                    return participants.filter(p => !p.checkedIn);
                }
            }, [participants, liveTab]);

            if (loading) return <div className="flex h-screen items-center justify-center"><div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div></div>;

            return (
                <div className="min-h-screen pb-24 md:pt-24 font-sans">
                    <div className="fixed inset-0 pointer-events-none overflow-hidden -z-10 no-print">
                        <div className="absolute top-0 left-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl opacity-50 animate-blob mix-blend-multiply"></div>
                        <div className="absolute top-0 right-1/4 w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl opacity-50 animate-blob animation-delay-2000 mix-blend-multiply"></div>
                        <div className="absolute -bottom-32 left-1/2 w-96 h-96 bg-pink-500/20 rounded-full blur-3xl opacity-50 animate-blob animation-delay-4000 mix-blend-multiply"></div>
                    </div>

                    <div className="hidden md:block no-print"><NavBar view={view} setView={setView} isAdmin={isAdmin} isManager={isManager} isScanner={isScanner} /></div>
                    <input type="file" ref={fileInputRef} onChange={handleImportCSV} accept=".csv" className="hidden no-print" />
                    
                    {/* Render Modal Analisa jika aktif */}
                    {showAnalysisModal && <ParticipantAnalysis participants={participants} onClose={() => setShowAnalysisModal(false)} />}

                    <main className="container mx-auto px-4 max-w-4xl">
                        {view === 'home' && (
                            <div className="flex flex-col items-center justify-center min-h-[70vh] text-center animate-fade-in relative">
                                {!isAdmin && !isScanner && !isManager && (
                                    <button onClick={() => setShowLoginModal(true)} className="absolute top-6 right-6 text-white/80 hover:text-white flex items-center gap-2 bg-white/10 backdrop-blur px-4 py-2 rounded-full transition hover:bg-white/20">
                                        <LogIn size={16} /> <span className="text-sm font-semibold">Login Petugas</span>
                                    </button>
                                )}
                                {(isAdmin || isScanner || isManager) && (
                                    <button onClick={logout} className="absolute top-6 right-6 text-red-100 hover:text-white flex items-center gap-2 bg-red-500/20 backdrop-blur px-4 py-2 rounded-full transition hover:bg-red-500/40 border border-red-500/30">
                                        <LogOut size={16} /> <span className="text-sm font-bold">Logout</span>
                                    </button>
                                )}
                                
                                <div className="mb-10 relative group">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-pink-600 to-purple-600 rounded-[2rem] blur opacity-75 group-hover:opacity-100 transition duration-1000 group-hover:duration-200 animate-tilt"></div>
                                    <div className="relative w-32 h-32 bg-white rounded-[1.7rem] flex items-center justify-center shadow-2xl"><Users className="text-primary w-16 h-16" /></div>
                                </div>
                                
                                <h1 className="hero-title text-4xl md:text-6xl mb-2">Namaposo GKPS Tangerang</h1>
                                <p className="text-indigo-200 text-lg mb-12 font-medium tracking-wide">Absensi Digital</p>
                                
                                <div className="grid grid-cols-2 gap-6 w-full max-w-md">
                                    <button onClick={() => setView('my-qr')} className="group glass-panel p-6 rounded-3xl hover:bg-white/90 transition-all duration-300 transform hover:-translate-y-1 hover:shadow-2xl">
                                        <QrCode className="w-10 h-10 text-primary mb-3 mx-auto group-hover:scale-110 transition" />
                                        <span className="block font-bold text-gray-800 text-lg">QR Saya</span>
                                    </button>
                                    <button onClick={() => setView('live')} className="group glass-panel p-6 rounded-3xl hover:bg-white/90 transition-all duration-300 transform hover:-translate-y-1 hover:shadow-2xl">
                                        <CheckCircle className="w-10 h-10 text-emerald-500 mb-3 mx-auto group-hover:scale-110 transition" />
                                        <span className="block font-bold text-gray-800 text-lg">Live</span>
                                    </button>
                                </div>
                            </div>
                        )}

                        {showLoginModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[60] p-4 animate-fade-in no-print">
                                <div className="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl transform scale-100 transition-all">
                                    <div className="flex justify-center mb-6"><div className="bg-indigo-100 p-3 rounded-full"><Lock className="text-primary w-8 h-8"/></div></div>
                                    <h3 className="text-2xl font-bold text-center mb-2 text-gray-800">Login Petugas</h3>
                                    <p className="text-center text-gray-500 mb-6 text-sm">Masuk dengan email & password.</p>
                                    <form onSubmit={handleSystemLogin}>
                                        <input type="email" value={loginEmail} onChange={e => { setLoginEmail(e.target.value); setLoginError(''); }}
                                            className="w-full p-4 border-2 border-gray-200 rounded-xl mb-3 text-gray-700 focus:border-primary focus:ring-4 focus:ring-primary/20 outline-none transition"
                                            placeholder="Email" autoFocus autoComplete="username" />
                                        <input type="password" value={loginPassword} onChange={e => { setLoginPassword(e.target.value); setLoginError(''); }}
                                            className="w-full p-4 border-2 border-gray-200 rounded-xl mb-3 text-gray-700 focus:border-primary focus:ring-4 focus:ring-primary/20 outline-none transition"
                                            placeholder="Password" autoComplete="current-password" />
                                        {loginError && <p className="text-red-500 text-sm text-center mb-3 font-medium">{loginError}</p>}
                                        <div className="flex gap-3">
                                            <button type="button" onClick={() => { setShowLoginModal(false); setLoginError(''); }} className="flex-1 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold transition">Batal</button>
                                            <button type="submit" disabled={loggingIn} className="flex-1 py-3 bg-primary text-white rounded-xl hover:bg-indigo-700 font-bold shadow-lg shadow-indigo-200 transition transform active:scale-95 disabled:opacity-60">{loggingIn ? 'Memproses...' : 'Masuk'}</button>
                                        </div>
                                    </form>
                                    <button onClick={forgotAdminPin} className="w-full text-center text-xs text-indigo-500 mt-6 hover:underline">Lupa Password?</button>
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (isAdmin || isManager) && (
                            <div className="animate-slide-up pb-24">
                                <div className="flex justify-between items-center mb-8">
                                    <div className="flex flex-col">
                                        <h1 className="text-3xl font-black text-white drop-shadow-md">Dashboard {isAdmin ? 'Admin' : 'Manager'}</h1>
                                        {isManager && <p className="text-indigo-200 text-xs font-bold bg-indigo-900/50 px-2 py-1 rounded inline-block w-fit mt-1">Akses Terbatas</p>}
                                    </div>
                                    <div className="flex gap-2">
                                        {isAdmin && (
                                            <>
                                                <button onClick={forgotAdminPin} className="bg-white/10 text-white px-4 py-2 rounded-lg text-sm font-bold backdrop-blur hover:bg-white/20 transition flex items-center gap-2"><KeyRound size={16}/> Reset Password</button>
                                            </>
                                        )}
                                        <button onClick={logout} className="bg-white/10 text-white px-4 py-2 rounded-lg text-sm font-bold backdrop-blur hover:bg-white/20 transition flex items-center gap-2"><LogOut size={16}/> Keluar</button>
                                    </div>
                                </div>

                                {/* TOMBOL FEATURE BARU: ANALISA DETAIL */}
                                <div className="mb-8">
                                    <button onClick={() => setShowAnalysisModal(true)} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-5 rounded-2xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-1 flex items-center justify-center gap-3">
                                        <div className="bg-white/20 p-2 rounded-lg"><LayoutList size={24}/></div>
                                        <div className="text-left">
                                            <span className="block font-black text-lg">BUKA ANALISA DETAIL PESERTA</span>
                                            <span className="block text-sm text-blue-100 opacity-90">Filter per jenis kelamin, status kehadiran, dan pencarian data spesifik.</span>
                                        </div>
                                    </button>
                                </div>

                                {isAdmin && (
                                    <div className={`p-6 rounded-3xl mb-8 flex flex-col md:flex-row justify-between items-center border-2 shadow-xl backdrop-blur-md transition-all duration-500 ${isSessionOpen ? 'bg-emerald-500/20 border-emerald-400' : 'bg-rose-500/20 border-rose-400'}`}>
                                        <div className="mb-4 md:mb-0">
                                            <h3 className="font-bold text-white text-xl flex items-center gap-2">
                                                {isSessionOpen ? <ShieldCheck className="text-emerald-300"/> : <Lock className="text-rose-300"/>}
                                                Status Sesi Absensi
                                            </h3>
                                            <p className={`text-sm font-medium mt-1 ${isSessionOpen ? 'text-emerald-200' : 'text-rose-200'}`}>
                                                {isSessionOpen ? '✅ SESI TERBUKA: Peserta bisa melakukan scan.' : '⛔ SESI DITUTUP: Akses check-in dikunci.'}
                                            </p>
                                        </div>
                                        <button onClick={async () => { await setDoc(doc(db, CONFIG_COLLECTION, 'session_status'), { open: !isSessionOpen }, { merge: true }); }} 
                                            className={`px-8 py-3 rounded-xl text-white font-bold shadow-lg transition transform hover:scale-105 active:scale-95 flex items-center gap-2 ${isSessionOpen ? 'bg-rose-500 hover:bg-rose-600' : 'bg-emerald-500 hover:bg-emerald-600'}`}>
                                            {isSessionOpen ? <><Lock size={18}/> TUTUP SESI SEKARANG</> : <><ShieldCheck size={18}/> BUKA SESI SEKARANG</>}
                                        </button>
                                    </div>
                                )}

                                {(isAdmin || isManager) && (
                                    <div className="glass-panel p-6 rounded-3xl shadow-lg mb-6">
                                        <div className="flex items-center justify-between mb-4">
                                            <h3 className="font-bold text-gray-800 flex items-center gap-2 text-lg"><CalendarDays className="text-primary"/> Sesi Retreat Namaposo</h3>
                                            {activeSessionId ? (
                                                <span className="text-xs font-bold bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-full">Sesi aktif: {sessions.find(s => s.id === activeSessionId)?.name || '-'}</span>
                                            ) : (
                                                <span className="text-xs font-bold bg-gray-100 text-gray-500 px-3 py-1.5 rounded-full">Belum ada sesi aktif</span>
                                            )}
                                        </div>

                                        {isAdmin && (
                                            <div className="bg-gray-50/60 rounded-2xl p-3 mb-4">
                                                <div className="flex flex-col sm:flex-row gap-2 mb-2">
                                                    <select value={newSessionDay} onChange={e => setNewSessionDay(e.target.value)} className="p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none">
                                                        <option value="11 Juli 2026">11 Juli 2026</option>
                                                        <option value="12 Juli 2026">12 Juli 2026</option>
                                                    </select>
                                                    <input className="flex-1 p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none" placeholder="Nama sesi (mis. Sesi 1: Ibadah Pembuka)" value={newSessionName} onChange={e => setNewSessionName(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') addSession(e); }} />
                                                </div>
                                                <div className="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                                                    <div className="flex items-center gap-2 flex-1">
                                                        <span className="text-xs font-bold text-gray-400 whitespace-nowrap">Jam</span>
                                                        <input type="time" value={newSessionStart} onChange={e => setNewSessionStart(e.target.value)} className="flex-1 p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none" />
                                                        <span className="text-gray-400">–</span>
                                                        <input type="time" value={newSessionEnd} onChange={e => setNewSessionEnd(e.target.value)} className="flex-1 p-3 bg-white border border-gray-200 rounded-xl text-sm outline-none" />
                                                    </div>
                                                    <button onClick={addSession} className="bg-primary text-white px-4 py-3 rounded-xl hover:bg-indigo-700 transition shadow-md flex items-center justify-center gap-2 font-bold"><Plus size={18}/> Tambah Sesi</button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
                                            {sessions.length === 0 && <p className="text-sm text-gray-400 italic text-center py-4">Belum ada sesi. {isAdmin ? 'Tambahkan sesi di atas.' : ''}</p>}
                                            {sessions.map(s => {
                                                const count = sessionCheckins.filter(c => c.sessionId === s.id).length;
                                                const isActive = s.id === activeSessionId;
                                                return (
                                                    <div key={s.id} className={`flex items-center justify-between p-3 rounded-xl border transition ${isActive ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-gray-100'}`}>
                                                        <div className="min-w-0">
                                                            <p className="font-bold text-gray-800 text-sm truncate">{s.name}</p>
                                                            <p className="text-xs text-gray-400">{s.day}{sessionTimeLabel(s) ? ' • ' + sessionTimeLabel(s) : ''} • <span className="font-bold text-indigo-600">{count} hadir</span></p>
                                                        </div>
                                                        <div className="flex gap-1 shrink-0 ml-2">
                                                            {isActive ? (
                                                                <button onClick={() => setActiveSession('')} className="bg-emerald-100 text-emerald-700 px-3 py-2 rounded-lg text-xs font-bold hover:bg-emerald-200 flex items-center gap-1"><ShieldCheck size={14}/> Aktif</button>
                                                            ) : (
                                                                <button onClick={() => setActiveSession(s.id)} className="bg-gray-100 text-gray-600 px-3 py-2 rounded-lg text-xs font-bold hover:bg-indigo-100 hover:text-indigo-700">Jadikan Aktif</button>
                                                            )}
                                                            {isAdmin && <button onClick={() => deleteSession(s.id, s.name)} className="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100" title="Hapus sesi"><Trash2 size={14}/></button>}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        {isAdmin && <p className="text-[11px] text-gray-400 mt-3 leading-relaxed">Tandai satu sesi sebagai <b>Aktif</b> agar check-in (scan petugas maupun peserta) tercatat ke sesi itu. Klik "Aktif" lagi untuk menonaktifkan.</p>}
                                    </div>
                                )}

                                {(isAdmin || isManager) && (
                                    <div className="glass-panel p-6 rounded-3xl shadow-lg mb-6">
                                        <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2 text-lg"><ClipboardList className="text-secondary"/> Daftar Hadir per Sesi</h3>
                                        {sessions.length === 0 ? (
                                            <p className="text-sm text-gray-400 italic py-3">Belum ada sesi. Buat sesi dulu di atas.</p>
                                        ) : (
                                            <>
                                                <select value={attnSessionId} onChange={e => { setAttnSessionId(e.target.value); setAttnSearch(''); }} className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none mb-4 font-medium">
                                                    <option value="">— Pilih sesi —</option>
                                                    {sessions.map(s => <option key={s.id} value={s.id}>{s.day} {sessionTimeLabel(s) ? '('+sessionTimeLabel(s)+') ' : ''}- {s.name}</option>)}
                                                </select>

                                                {attnSessionId && (() => {
                                                    const session = sessions.find(s => s.id === attnSessionId);
                                                    if (!session) return null;
                                                    const checkins = sessionCheckins
                                                        .filter(c => c.sessionId === session.id)
                                                        .sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                                                    const presentRegs = new Set(checkins.map(c => (c.regNum || '').toUpperCase()));
                                                    const term = attnSearch.trim().toLowerCase();
                                                    const candidates = term
                                                        ? participants.filter(p => !presentRegs.has((p.regNum || '').toUpperCase()) && (p.name.toLowerCase().includes(term) || (p.regNum || '').toLowerCase().includes(term))).slice(0, 6)
                                                        : [];
                                                    return (
                                                        <div>
                                                            <div className="flex flex-wrap items-center justify-between gap-2 mb-3">
                                                                <span className="text-sm font-bold text-gray-700">{checkins.length} peserta hadir</span>
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => exportSessionXLS(session)} className="text-xs font-bold bg-emerald-100 text-emerald-700 px-3 py-2 rounded-lg hover:bg-emerald-200 transition flex items-center gap-1"><Download size={14}/> Excel</button>
                                                                    <button onClick={() => exportSessionPDF(session)} className="text-xs font-bold bg-violet-100 text-violet-700 px-3 py-2 rounded-lg hover:bg-violet-200 transition flex items-center gap-1"><Download size={14}/> PDF</button>
                                                                </div>
                                                            </div>

                                                            <div className="relative mb-3">
                                                                <input value={attnSearch} onChange={e => setAttnSearch(e.target.value)} placeholder="Tandai hadir manual: ketik nama / ID peserta..." className="w-full p-3 bg-indigo-50 border border-indigo-100 rounded-xl text-sm outline-none focus:ring-2 focus:ring-primary/30" />
                                                                {candidates.length > 0 && (
                                                                    <div className="absolute z-20 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden">
                                                                        {candidates.map(p => (
                                                                            <button key={p.id} onClick={() => addManualCheckin(session, p)} className="w-full text-left px-4 py-2.5 hover:bg-indigo-50 transition flex items-center justify-between">
                                                                                <span className="text-sm font-medium text-gray-700">{p.name} <span className="text-gray-400 font-mono text-xs">{p.regNum}</span></span>
                                                                                <Plus size={16} className="text-primary"/>
                                                                            </button>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>

                                                            <div className="space-y-1.5 max-h-72 overflow-y-auto pr-1">
                                                                {checkins.length === 0 && <p className="text-sm text-gray-400 italic text-center py-3">Belum ada yang hadir di sesi ini.</p>}
                                                                {checkins.map((c, i) => (
                                                                    <div key={c.id} className="flex items-center justify-between bg-white p-2.5 rounded-xl border border-gray-100">
                                                                        <div className="flex items-center gap-3 min-w-0">
                                                                            <span className="text-xs font-bold text-gray-300 w-5 text-right">{i + 1}</span>
                                                                            <div className="min-w-0">
                                                                                <p className="font-bold text-gray-800 text-sm truncate">{c.name} {c.manual && <span className="text-[10px] bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded-full align-middle">manual</span>}</p>
                                                                                <p className="text-xs text-gray-400 font-mono">{c.regNum} • {formatTime(c.timestamp)}</p>
                                                                            </div>
                                                                        </div>
                                                                        <button onClick={() => removeCheckin(c.id, c.name)} className="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-100 shrink-0 ml-2" title="Hapus dari sesi"><Trash2 size={14}/></button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    );
                                                })()}
                                            </>
                                        )}
                                    </div>
                                )}

                                <StatsChart participants={participants} sessions={sessions} sessionCheckins={sessionCheckins} />

                                <div className="grid md:grid-cols-2 gap-6">
                                    {isAdmin && (
                                        <div className="glass-panel p-6 rounded-3xl shadow-lg">
                                            <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2 text-lg"><UserCog className="text-primary"/> Petugas & Peran</h3>
                                            <div className="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-4">
                                                <p className="text-sm text-gray-600 leading-relaxed">
                                                    Akun petugas kini dikelola lewat <span className="font-bold text-indigo-700">Firebase Authentication</span> (email & password), dan peran (admin / manager / scanner) ditetapkan secara aman lewat <span className="font-mono text-xs bg-white px-1.5 py-0.5 rounded border">set-roles.js</span> di komputer pengurus. Ini mencegah peran dipalsukan dari browser.
                                                </p>
                                            </div>
                                            <div className="space-y-2 text-sm text-gray-600">
                                                <p className="flex items-start gap-2"><ShieldCheck size={16} className="text-emerald-500 mt-0.5 shrink-0"/> Tambah akun baru: Console → Authentication → Add user.</p>
                                                <p className="flex items-start gap-2"><KeyRound size={16} className="text-blue-500 mt-0.5 shrink-0"/> Beri peran: jalankan script <span className="font-mono text-xs">set-roles.js</span> (lihat panduan).</p>
                                                <p className="flex items-start gap-2"><Trash2 size={16} className="text-rose-500 mt-0.5 shrink-0"/> Hapus/nonaktifkan: Console → Authentication → hapus user.</p>
                                            </div>
                                        </div>
                                    )}

                                    <div className={`glass-panel p-6 rounded-3xl shadow-lg ${!isAdmin ? 'md:col-span-2' : ''}`}>
                                        <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2 text-lg"><Users className="text-secondary"/> Kelola Peserta</h3>
                                        <form onSubmit={addParticipant} className="flex flex-col gap-2 mb-4">
                                            <div className="flex gap-2">
                                                <input className="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm" placeholder="Nama Lengkap" value={newName} onChange={e => setNewName(e.target.value)} required/>
                                                <input className="w-28 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm text-center" placeholder="ID/Reg" value={newRegNum} onChange={e => setNewRegNum(e.target.value)} required/>
                                            </div>
                                            <div className="flex gap-2 relative">
                                                <div className="relative w-full">
                                                    <select 
                                                        className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm appearance-none outline-none focus:ring-2 focus:ring-secondary/50"
                                                        value={newClass} 
                                                        onChange={e => setNewClass(e.target.value)}
                                                        required
                                                    >
                                                        <option value="">Pilih Jenis Kelamin...</option>
                                                        {CLASS_OPTIONS.map(c => (
                                                            <option key={c} value={c}>{c}</option>
                                                        ))}
                                                    </select>
                                                    <div className="absolute right-3 top-3.5 pointer-events-none text-gray-400">
                                                        <ChevronDown size={16} />
                                                    </div>
                                                </div>
                                                
                                                <button type="submit" className="bg-secondary text-white p-3 rounded-xl hover:bg-violet-700 transition shadow-md w-12 flex items-center justify-center shrink-0"><Plus size={20}/></button>
                                            </div>
                                        </form>
                                        <div className="mb-2 relative"><Search className="absolute left-3 top-3 text-gray-400 w-4 h-4"/><input className="w-full pl-9 p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm" placeholder="Cari..." value={adminSearch} onChange={e => setAdminSearch(e.target.value)} /></div>
                                        <div className="space-y-1 max-h-48 overflow-y-auto pr-1">
                                            {participants.filter(p => p.name.toLowerCase().includes(adminSearch.toLowerCase())).map(p => (
                                                <div key={p.id} className="flex justify-between items-center bg-white p-2.5 rounded-xl border border-gray-100 hover:bg-gray-50 transition group">
                                                    <div><span className="font-bold text-sm text-gray-800">{p.name}</span> <span className="text-xs text-primary font-bold bg-indigo-50 px-1.5 py-0.5 rounded ml-1">{p.regNum}</span></div>
                                                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition"><button onClick={() => downloadQR(p)} className="text-blue-500 hover:bg-blue-50 p-1.5 rounded-lg"><Download size={14}/></button><button onClick={() => deleteParticipant(p.id, p.name)} className="text-red-500 hover:bg-red-50 p-1.5 rounded-lg"><Trash2 size={14}/></button></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-8 glass-panel p-6 rounded-3xl shadow-lg">
                                    <h3 className="font-bold text-gray-800 mb-4 text-sm uppercase tracking-wider text-center opacity-70">Tindakan Lanjutan</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-6 gap-4">
                                        <button onClick={() => fileInputRef.current.click()} disabled={importing} className="bg-gray-100 text-gray-700 hover:bg-gray-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition disabled:opacity-50"><FileUp size={20}/> Import CSV</button>
                                        <button onClick={() => setShowPrintModal(true)} className="bg-purple-100 text-purple-700 hover:bg-purple-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition"><Printer size={20}/> Cetak QR</button>
                                        
                                        {/* EXPORT BUTTONS */}
                                        <button onClick={handleExportXLS} className="bg-green-100 text-green-700 hover:bg-green-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition"><FileSpreadsheet size={20}/> Excel Laporan</button>
                                        <button onClick={handleExportPDF} className="bg-red-100 text-red-700 hover:bg-red-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition"><FileText size={20}/> PDF Laporan</button>
                                        
                                        {/* NEW BACKUP BUTTON */}
                                        <button onClick={handleSystemBackup} className="bg-blue-100 text-blue-700 hover:bg-blue-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition border border-blue-200 shadow-sm"><Archive size={20}/> Backup Data</button>

                                        <button onClick={resetAttendance} className="bg-orange-100 text-orange-700 hover:bg-orange-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition"><RefreshCw size={20}/> Reset Hadir</button>
                                        {isAdmin && <button onClick={deleteAllData} className="bg-rose-100 text-rose-700 hover:bg-rose-200 p-3 rounded-xl text-sm font-bold flex flex-col items-center gap-2 transition"><AlertTriangle size={20}/> Hapus Semua</button>}
                                    </div>
                                    {importing && <p className="text-center text-primary font-bold text-xs mt-3 animate-pulse">{importProgress}</p>}
                                </div>
                            </div>
                        )}

                        {view === 'scanner' && <ScannerView scanInput={scanInput} setScanInput={setScanInput} handleCheckIn={handleCheckIn} scanStatus={scanStatus} scannedName={scannedName} isSessionOpen={isSessionOpen} isAdmin={isAdmin} isManager={isManager} isScanner={isScanner} activeSessionName={(() => { const s = sessions.find(x => x.id === activeSessionId); return s ? (s.name + (sessionTimeLabel(s) ? ' ('+sessionTimeLabel(s)+')' : '')) : ''; })()} />}
                        
                        {/* =======================================================
                          FIXED LIVE VIEW BLOCK - RESTORED
                          =======================================================
                        */}
                        {view === 'live' && (
                            <div className="animate-slide-up pb-24 max-w-2xl mx-auto">
                                <h2 className="text-3xl font-black text-white text-center mb-6 drop-shadow-md">Live Monitoring</h2>
                                <div className="glass-panel p-2 rounded-2xl flex mb-6 shadow-lg">
                                    <button onClick={() => setLiveTab('present')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 ${liveTab === 'present' ? 'bg-white text-primary shadow-md' : 'text-gray-600 hover:bg-white/50'}`}>
                                        Hadir ({participants.filter(p => p.checkedIn).length})
                                    </button>
                                    <button onClick={() => setLiveTab('absent')} className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all duration-300 ${liveTab === 'absent' ? 'bg-white text-rose-500 shadow-md' : 'text-gray-600 hover:bg-white/50'}`}>
                                        Belum ({participants.filter(p => !p.checkedIn).length})
                                    </button>
                                </div>

                                <div className="space-y-3">
                                    {displayedParticipants.length > 0 ? (
                                        displayedParticipants.map(p => (
                                            <div key={p.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center animate-fade-in hover:shadow-md transition">
                                                <div className="flex items-center gap-3">
                                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${p.checkedIn ? 'bg-gradient-to-br from-emerald-400 to-emerald-600' : 'bg-gray-300'}`}>
                                                        {p.name.charAt(0)}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-gray-800 text-sm">{p.name}</h4>
                                                        <p className="text-xs text-gray-500 font-mono">{p.regNum} • {p.kelas}</p>
                                                    </div>
                                                </div>
                                                {p.checkedIn && (
                                                    <div className="text-right">
                                                        <span className="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded-full block mb-1">HADIR</span>
                                                        <span className="text-[10px] text-gray-400 font-mono">{formatTime(p.checkInTime)}</span>
                                                    </div>
                                                )}
                                                {!p.checkedIn && (
                                                     <span className="bg-gray-100 text-gray-500 text-[10px] font-bold px-2 py-1 rounded-full">BELUM</span>
                                                )}
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center py-12 glass-panel rounded-3xl">
                                            <p className="text-gray-500 font-medium italic">Tidak ada data untuk kategori ini.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        {/* END FIXED LIVE VIEW */}

                        {view === 'my-qr' && (
                            <div className="flex flex-col items-center min-h-[70vh] p-6 max-w-md mx-auto animate-fade-in">
                                <h2 className="text-3xl font-bold mb-6 text-white drop-shadow-md">Cari QR Saya</h2>
                                {!myParticipantData ? (
                                    <div className="w-full glass-panel p-8 rounded-[2rem] shadow-2xl">
                                        <div className="relative mb-6">
                                            <Search className="absolute left-4 top-4 text-gray-400" />
                                            <input type="text" value={myRegLogin} onChange={(e) => setMyRegLogin(e.target.value)} className="w-full pl-12 p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-primary/30 transition text-lg" placeholder="Masukkan Nama / ID..." />
                                        </div>
                                        <button onClick={(e) => { e.preventDefault(); const term = myRegLogin.toLowerCase().trim(); if(!term) return; const matches = participants.filter(p => p.regNum.toLowerCase() === term || p.name.toLowerCase().includes(term)); if (matches.length === 1) setMyParticipantData(matches[0]); else if (matches.length > 1) setSearchResults(matches); else alert('Data tidak ditemukan'); }} className="w-full bg-primary text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition transform active:scale-95">Cari Data</button>
                                        {searchResults.length > 0 && <div className="mt-6 space-y-2 max-h-60 overflow-y-auto pr-1">{searchResults.map(p => (<button key={p.id} onClick={() => { setMyParticipantData(p); setSearchResults([]); }} className="w-full text-left p-4 bg-white border border-gray-100 rounded-xl hover:bg-indigo-50 transition flex justify-between items-center group"><div><p className="font-bold text-gray-800">{p.name}</p><p className="text-xs text-gray-500 uppercase">{p.kelas}</p></div><div className="bg-gray-100 p-2 rounded-full group-hover:bg-white transition"><Search size={16} className="text-gray-400 group-hover:text-primary" /></div></button>))}</div>}
                                    </div>
                                ) : (
                                    <div className="text-center animate-fade-in w-full max-w-lg">
                                        <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl mb-6 relative overflow-hidden max-w-sm mx-auto">
                                            <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-secondary"></div>
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${myParticipantData.regNum}&color=4f46e5`} alt="QR" className="mx-auto mix-blend-multiply" />
                                            <p className="mt-4 text-xs font-mono font-bold text-gray-400 tracking-widest">{myParticipantData.regNum}</p>
                                        </div>
                                        <div className="glass-panel p-6 rounded-3xl shadow-lg">
                                            <h3 className="text-2xl font-black text-gray-800 leading-tight mb-1">{myParticipantData.name}</h3>
                                            <p className="text-gray-500 font-medium mb-4 uppercase text-sm tracking-wide">{myParticipantData.kelas}</p>
                                            {myParticipantData.checkedIn ? <div className="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl font-bold inline-flex items-center gap-2"><CheckCircle size={18}/> SUDAH HADIR</div> : <div className="bg-gray-100 text-gray-500 px-4 py-2 rounded-xl font-bold inline-flex items-center gap-2"><div className="w-2 h-2 bg-gray-400 rounded-full"></div> BELUM HADIR</div>}

                                            {(() => {
                                                const activeSession = sessions.find(s => s.id === activeSessionId);
                                                if (!activeSession) return null;
                                                const already = sessionCheckins.some(c => c.sessionId === activeSession.id && (c.regNum || '').toUpperCase() === (myParticipantData.regNum || '').toUpperCase());
                                                return (
                                                    <div className="mt-5 bg-indigo-50 border border-indigo-100 rounded-2xl p-4 text-left">
                                                        <p className="text-xs font-bold text-indigo-500 uppercase tracking-wide mb-1">Sesi berlangsung</p>
                                                        <p className="font-bold text-gray-800 mb-3">{activeSession.day}{sessionTimeLabel(activeSession) ? ' • ' + sessionTimeLabel(activeSession) : ''} • {activeSession.name}</p>
                                                        {already ? (
                                                            <div className="bg-emerald-100 text-emerald-700 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2"><CheckCircle size={18}/> Anda sudah hadir di sesi ini</div>
                                                        ) : !isSessionOpen ? (
                                                            <div className="bg-rose-50 text-rose-600 border border-rose-200 px-4 py-3 rounded-xl font-bold flex items-center justify-center gap-2 text-center"><Lock size={18}/> Sesi absensi sedang ditutup panitia</div>
                                                        ) : (
                                                            <button onClick={selfCheckIn} className="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition transform active:scale-95 flex items-center justify-center gap-2"><CheckCircle size={18}/> Catat Kehadiran Saya</button>
                                                        )}
                                                    </div>
                                                );
                                            })()}

                                            {sessions.length > 0 && (
                                                <div className="mt-5 text-left">
                                                    <div className="flex items-center justify-between mb-3">
                                                        <h4 className="font-bold text-gray-800 flex items-center gap-2"><FileText size={18} className="text-secondary"/> Catatan Materi</h4>
                                                        <button onClick={exportMyNotesPDF} className="text-xs font-bold bg-violet-100 text-violet-700 px-3 py-1.5 rounded-lg hover:bg-violet-200 transition flex items-center gap-1"><Download size={14}/> PDF</button>
                                                    </div>
                                                    <div className="space-y-3 max-h-[420px] overflow-y-auto pr-1">
                                                        {sessions.map(s => {
                                                            const existing = myNotes.find(n => n.sessionId === s.id);
                                                            const draftVal = noteDrafts[s.id] ?? (existing?.content ?? '');
                                                            return (
                                                                <div key={s.id} className="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm">
                                                                    <p className="text-xs font-bold text-indigo-600 mb-1">{s.day}{sessionTimeLabel(s) ? ' • ' + sessionTimeLabel(s) : ''}</p>
                                                                    <p className="font-bold text-gray-800 text-sm mb-2">{s.name}</p>
                                                                    <textarea
                                                                        value={draftVal}
                                                                        onChange={e => setNoteDrafts(prev => ({ ...prev, [s.id]: e.target.value }))}
                                                                        placeholder="Tulis catatan materi sesi ini..."
                                                                        rows="3"
                                                                        className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-secondary/40 resize-y"
                                                                    />
                                                                    <div className="flex items-center justify-between mt-2">
                                                                        <span className="text-[11px] text-gray-400">{existing?.updatedAt ? 'Tersimpan ' + formatTime(existing.updatedAt) : 'Belum disimpan'}</span>
                                                                        <button onClick={() => saveNote(s.id)} disabled={savingNoteId === s.id} className="text-xs font-bold bg-secondary text-white px-4 py-2 rounded-lg hover:bg-violet-700 transition disabled:opacity-60">{savingNoteId === s.id ? 'Menyimpan...' : 'Simpan'}</button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            <button onClick={() => { setMyParticipantData(null); setMyRegLogin(''); setNoteDrafts({}); }} className="block w-full mt-6 py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold hover:border-gray-400 hover:text-gray-700 transition">Cari Kembali</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    
                    {showPrintModal && (
                        <div className="fixed inset-0 bg-white z-[100] overflow-auto animate-fade-in">
                            <div className="p-4 border-b flex justify-between items-center bg-gray-50 sticky top-0 no-print shadow-sm">
                                <h2 className="font-bold text-lg text-gray-800">Preview Cetak ({participants.length})</h2>
                                <div className="flex gap-2"><button onClick={() => window.print()} className="bg-primary text-white px-4 py-2 rounded-lg flex items-center gap-2 font-bold hover:bg-indigo-700 transition text-sm"><Printer size={16}/> Cetak</button><button onClick={() => setShowPrintModal(false)} className="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition text-sm font-bold">Tutup</button></div>
                            </div>
                            <div id="print-area" className="p-8 grid grid-cols-2 md:grid-cols-4 gap-6 bg-white">
                                {participants.map(p => (
                                    <div key={p.id} className="print-card border border-gray-200 rounded-xl p-6 flex flex-col items-center justify-center text-center shadow-sm">
                                        <h3 className="font-bold text-sm mb-1 truncate w-full">{p.name}</h3><p className="text-[10px] text-gray-500 mb-3 uppercase tracking-wide">{p.kelas} • {p.category}</p>
                                        <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${p.regNum}`} alt="QR" className="w-28 h-28 mb-3 mix-blend-multiply" />
                                        <p className="text-xs font-mono font-bold bg-gray-100 text-gray-600 px-3 py-1 rounded-full">{p.regNum}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="md:hidden pb-24 no-print"></div>
                    <div className="md:hidden no-print"><NavBar view={view} setView={setView} isAdmin={isAdmin} isManager={isManager} isScanner={isScanner} /></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
