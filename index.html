<!DOCTYPE html>                    
  
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaposo GKPS Tangerang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/qr-scanner@1.4.2/qr-scanner.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        // SHIM: Memastikan autotable bisa menemukan jsPDF
        if (typeof window.jspdf !== 'undefined') {
            window.jsPDF = window.jspdf.jsPDF;
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#8b5cf6', accent: '#06b6d4' },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'flash': 'flash 0.5s ease-out',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        flash: { '0%': { opacity: '0.8', backgroundColor: 'white' }, '100%': { opacity: '0', backgroundColor: 'transparent' } }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f3f4f6;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            background-size: cover;
        }

        /* === Judul utama: font ekspresif + warna cerah + animasi === */
        .hero-title {
            font-family: 'Baloo 2', system-ui, sans-serif;
            font-weight: 800;
            letter-spacing: 0.01em;
            line-height: 1.05;
            background: linear-gradient(100deg, #fef08a 0%, #fda4af 25%, #f0abfc 50%, #a5b4fc 75%, #67e8f9 100%);
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 2px 10px rgba(236, 110, 173, 0.45)) drop-shadow(0 0 22px rgba(129, 140, 248, 0.35));
            animation: heroShine 6s linear infinite;
        }
        @keyframes heroShine {
            to { background-position: 220% center; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255, 255, 255, 0.5);
        }
        .scan-container {
            position: relative; width: 100%; height: 380px; overflow: hidden;
            border-radius: 1.5rem; background: #000;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .scan-video { width: 100%; height: 100%; object-fit: cover; }
        .scan-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 65%, rgba(0,0,0,0.8) 100%); pointer-events: none;
        }
        .scan-flash {
            position: absolute; inset: 0; pointer-events: none; z-index: 50;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* OPTIMIZED PRINT CSS */
        @media print {
            @page {
                size: auto;
                margin: 5mm;
            }
            body * {
                visibility: hidden; /* Sembunyikan elemen secara default */
            }
            body {
                background: white !important;
                background-image: none !important;
                margin: 0;
                padding: 0;
            }
            /* Hanya tampilkan area cetak */
            #print-area, #print-area * {
                visibility: visible;
            }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
                background: white;
                display: grid !important;
                grid-template-columns: repeat(4, 1fr) !important; /* Paksa 4 kolom */
                gap: 10px !important;
            }
            .no-print {
                display: none !important;
            }
            .print-card {
                border: 1px solid #000 !important;
                box-shadow: none !important;
                break-inside: avoid;
                page-break-inside: avoid;
                margin-bottom: 10px;
                padding: 10px !important;
                border-radius: 8px !important;
            }
            .print-card h3 {
                font-size: 10pt !important;
                color: black !important;
            }
            .print-card p {
                font-size: 8pt !important;
                color: black !important;
            }
            /* Pastikan kontainer modal tidak menghalangi saat print */
            .fixed.inset-0 {
                position: static !important;
                overflow: visible !important;
            }
        }
    </style>
</head>
<body class="text-gray-800 font-sans antialiased min-h-screen selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-analytics.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, where, updateDoc, doc, serverTimestamp, deleteDoc, writeBatch, enableIndexedDbPersistence, setDoc, getDoc, getDocs } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, getIdTokenResult } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { QrCode, Users, CheckCircle, Search, Download, Trash2, Plus, Lock, LogOut, Camera, AlertCircle, RefreshCw, FileUp, User, LogIn, UserCog, CameraOff, List, Printer, AlertTriangle, KeyRound, Sparkles, ShieldCheck, PieChart, BarChart3, XCircle, FileSpreadsheet, FileText, TrendingUp, Filter, LayoutList, X, CalendarDays, TableProperties, LineChart, ChevronDown, Briefcase, Archive, ClipboardList } from 'https://esm.sh/lucide-react@0.292.0';

        const firebaseConfig = {
            apiKey: "AIzaSyBgTad0gvBf1iAuEwqygosYmzeypl76Dv8",
            authDomain: "namaposo-gkpstgr.firebaseapp.com",
            projectId: "namaposo-gkpstgr",
            storageBucket: "namaposo-gkpstgr.firebasestorage.app",
            messagingSenderId: "574446807202",
            appId: "1:574446807202:web:97971725ebe2811834cffb",
            measurementId: "G-CW4ET68ERZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // Analytics: dibungkus try/catch agar tidak merusak fitur lain jika gagal dimuat (mis. file lokal / ad-blocker)
        let analytics = null;
        try { analytics = getAnalytics(app); } catch (e) { console.log("Analytics tidak aktif:", e?.message || e); }
        enableIndexedDbPersistence(db).catch(err => console.log("Persistence warning:", err.code));

        const COLLECTION_NAME = 'gkps_participants';
        const CONFIG_COLLECTION = 'gkps_config';
        const LOGS_COLLECTION = 'gkps_attendance_logs';
        const SESSIONS_COLLECTION = 'gkps_sessions';
        const SESSION_CHECKINS_COLLECTION = 'gkps_session_checkins';
        const NOTES_COLLECTION = 'gkps_notes';

        const CLASS_OPTIONS = [
            "Laki-laki",
            "Perempuan"
        ];

        const formatTime = (timestamp) => {
            if (!timestamp) return '-';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return '-';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        };

        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.error("Audio error", e);
            }
        };

        const ParticipantAnalysis = ({ participants, onClose }) => {
            const [filterKelas, setFilterKelas] = React.useState('SEMUA');
            const [filterStatus, setFilterStatus] = React.useState('SEMUA');
            const [search, setSearch] = React.useState('');
            const [viewMode, setViewMode] = React.useState('list'); 

            const modalPieRef = React.useRef(null);
            const modalBarRef = React.useRef(null);
            const modalLineRef = React.useRef(null);

            const chartInstancePie = React.useRef(null);
            const chartInstanceBar = React.useRef(null);
            const chartInstanceLine = React.useRef(null);

            const uniqueClasses = ['SEMUA', ...new Set(participants.map(p => p.kelas || 'Tanpa Keterangan'))].sort();
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agt', 'Sep', 'Okt', 'Nov', 'Des'];

            const filteredData = React.useMemo(() => {
                return participants.filter(p => {
                    const kelasMatch = filterKelas === 'SEMUA' || (p.kelas || 'Tanpa Keterangan') === filterKelas;
                    const statusMatch = filterStatus === 'SEMUA' || 
                                      (filterStatus === 'HADIR' && p.checkedIn) || 
                                      (filterStatus === 'BELUM' && !p.checkedIn);
                    const searchMatch = p.name.toLowerCase().includes(search.toLowerCase()) || 
                                      p.regNum.toLowerCase().includes(search.toLowerCase());
                    return kelasMatch && statusMatch && searchMatch;
                });
            }, [participants, filterKelas, filterStatus, search]);

            const stats = {
                total: filteredData.length,
                hadir: filteredData.filter(p => p.checkedIn).length,
                absen: filteredData.filter(p => !p.checkedIn).length
            };
            const persentase = stats.total > 0 ? Math.round((stats.hadir / stats.total) * 100) : 0;

            React.useEffect(() => {
                if (viewMode !== 'list') return; 

                const classDist = {};
                filteredData.forEach(p => {
                    const c = p.kelas || 'Tanpa Keterangan';
                    classDist[c] = (classDist[c] || 0) + 1;
                });
                const barLabels = Object.keys(classDist);
                const barValues = Object.values(classDist);

                const monthCounts = {};
                months.forEach(m => monthCounts[m] = 0);
                
                filteredData.filter(p => p.checkedIn && p.checkInTime).forEach(p => {
                    const date = p.checkInTime.toDate ? p.checkInTime.toDate() : new Date(p.checkInTime);
                    const monthIndex = date.getMonth(); 
                    const monthName = months[monthIndex];
                    if(monthName) monthCounts[monthName] += 1;
                });
                const lineData = Object.values(monthCounts);

                if (chartInstancePie.current) chartInstancePie.current.destroy();
                if (chartInstanceBar.current) chartInstanceBar.current.destroy();
                if (chartInstanceLine.current) chartInstanceLine.current.destroy();

                if (modalPieRef.current) {
                    chartInstancePie.current = new Chart(modalPieRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: ['Hadir', 'Belum'],
                            datasets: [{
                                data: [stats.hadir, stats.absen],
                                backgroundColor: ['#10b981', '#f43f5e'],
                                borderWidth: 0,
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }, title: { display: false } } }
                    });
                }

                if (modalBarRef.current) {
                    chartInstanceBar.current = new Chart(modalBarRef.current, {
                        type: 'bar',
                        data: {
                            labels: barLabels,
                            datasets: [{
                                label: 'Jml Peserta',
                                data: barValues,
                                backgroundColor: '#6366f1',
                                borderRadius: 6,
                                barPercentage: 0.6
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { borderDash: [5, 5], display: true } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
                    });
                }

                 if (modalLineRef.current) {
                    chartInstanceLine.current = new Chart(modalLineRef.current, {
                        type: 'line',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'Trend Kehadiran',
                                data: lineData,
                                borderColor: '#06b6d4',
                                backgroundColor: 'rgba(6, 182, 212, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
                    });
                }

                return () => {
                    if (chartInstancePie.current) chartInstancePie.current.destroy();
                    if (chartInstanceBar.current) chartInstanceBar.current.destroy();
                    if (chartInstanceLine.current) chartInstanceLine.current.destroy();
                };
            }, [filteredData, stats, viewMode]);

            return (
                <div className="fixed inset-0 z-[100] bg-gray-900/50 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white w-full max-w-6xl h-[95vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                        <div className="bg-gradient-to-r from-primary to-secondary p-5 text-white flex justify-between items-center shrink-0">
                            <div><h2 className="text-2xl font-black flex items-center gap-2"><LayoutList /> Analisa & Laporan</h2><p className="text-indigo-100 text-sm opacity-90">Analisa kehadiran peserta secara detail dan per bulan.</p></div>
                            <button onClick={onClose} className="bg-white/20 hover:bg-white/30 p-2 rounded-full transition"><X size={24} /></button>
                        </div>
                        <div className="p-6 bg-gray-50 border-b border-gray-200 shrink-0">
                            <div className="flex flex-col xl:flex-row gap-4 mb-4 justify-between items-end xl:items-center">
                                <div className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-3 w-full xl:w-auto">
                                    <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Filter size={16} className="text-gray-400"/></div><select value={filterKelas} onChange={e => setFilterKelas(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none bg-white">{uniqueClasses.map(c => <option key={c} value={c}>{c === 'SEMUA' ? 'Semua Jenis Kelamin' : c}</option>)}</select></div>
                                    <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><CheckCircle size={16} className="text-gray-400"/></div><select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none bg-white"><option value="SEMUA">Semua Status</option><option value="HADIR">Sudah Hadir</option><option value="BELUM">Belum Hadir</option></select></div>
                                    <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Search size={16} className="text-gray-400"/></div><input type="text" placeholder="Cari Nama/ID..." value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent outline-none" /></div>
                                </div>
                                <div className="bg-gray-200 p-1 rounded-xl flex shrink-0">
                                    <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition ${viewMode === 'list' ? 'bg-white text-primary shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><TableProperties size={16}/> List Detail</button>
                                    <button onClick={() => setViewMode('matrix')} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition ${viewMode === 'matrix' ? 'bg-white text-primary shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><CalendarDays size={16}/> Matriks Bulanan</button>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-white p-3 rounded-2xl border border-gray-200 shadow-sm"><p className="text-[10px] text-gray-500 font-bold uppercase">Total Filter</p><p className="text-2xl font-black text-gray-800">{stats.total}</p></div>
                                <div className="bg-emerald-50 p-3 rounded-2xl border border-emerald-100 shadow-sm"><p className="text-[10px] text-emerald-600 font-bold uppercase">Hadir</p><p className="text-2xl font-black text-emerald-600">{stats.hadir}</p></div>
                                <div className="bg-rose-50 p-3 rounded-2xl border border-rose-100 shadow-sm"><p className="text-[10px] text-rose-600 font-bold uppercase">Belum</p><p className="text-2xl font-black text-rose-500">{stats.absen}</p></div>
                                <div className="bg-indigo-50 p-3 rounded-2xl border border-indigo-100 shadow-sm"><p className="text-[10px] text-indigo-600 font-bold uppercase">Persentase</p><p className="text-2xl font-black text-indigo-600">{persentase}%</p></div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-hidden bg-white flex flex-col">
                            {viewMode === 'list' ? (
                                <div className="flex-1 overflow-auto p-6">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                                        <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col"><h4 className="font-bold text-gray-600 mb-2 text-xs uppercase flex items-center gap-2"><PieChart size={14}/> Komposisi Status</h4><div className="flex-1 min-h-[150px] relative"><canvas ref={modalPieRef}></canvas></div></div>
                                        <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col"><h4 className="font-bold text-gray-600 mb-2 text-xs uppercase flex items-center gap-2"><BarChart3 size={14}/> Distribusi Jenis Kelamin</h4><div className="flex-1 min-h-[150px] relative"><canvas ref={modalBarRef}></canvas></div></div>
                                        <div className="bg-white p-4 rounded-2xl border border-gray-200 shadow-sm flex flex-col"><h4 className="font-bold text-gray-600 mb-2 text-xs uppercase flex items-center gap-2"><TrendingUp size={14}/> Matriks Bulanan</h4><div className="flex-1 min-h-[150px] relative"><canvas ref={modalLineRef}></canvas></div></div>
                                    </div>
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-gray-100 sticky top-0 z-10"><tr><th className="p-4 rounded-tl-xl text-xs font-bold text-gray-500 uppercase tracking-wider">ID</th><th className="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Nama Peserta</th><th className="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Jenis Kelamin</th><th className="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Kategori</th><th className="p-4 text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th><th className="p-4 rounded-tr-xl text-xs font-bold text-gray-500 uppercase tracking-wider">Waktu</th></tr></thead>
                                        <tbody className="divide-y divide-gray-100">{filteredData.length > 0 ? (filteredData.map((p) => (<tr key={p.id} className="hover:bg-gray-50 transition"><td className="p-4 font-mono text-sm text-gray-600">{p.regNum}</td><td className="p-4 font-bold text-gray-800">{p.name}</td><td className="p-4 text-sm text-gray-600"><span className="bg-gray-100 px-2 py-1 rounded-md font-bold text-xs">{p.kelas}</span></td><td className="p-4 text-sm text-gray-600">{p.category || '-'}</td><td className="p-4">{p.checkedIn ? <span className="inline-flex items-center gap-1 bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full text-xs font-bold"><CheckCircle size={12}/> Hadir</span> : <span className="inline-flex items-center gap-1 bg-rose-100 text-rose-700 px-2 py-1 rounded-full text-xs font-bold"><XCircle size={12}/> Belum</span>}</td><td className="p-4 text-sm text-gray-500 font-mono">{formatTime(p.checkInTime)}</td></tr>))) : (<tr><td colSpan="6" className="p-12 text-center text-gray-400 font-medium italic">Data tidak ditemukan.</td></tr>)}</tbody>
                                    </table>
                                </div>
                            ) : (
                                <div className="flex-1 overflow-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-gray-100 sticky top-0 z-20 shadow-sm"><tr><th className="p-3 bg-gray-100 sticky left-0 z-30 border-r border-gray-200 min-w-[200px] text-xs font-bold text-gray-600 uppercase">Nama Peserta</th>{months.map(m => (<th key={m} className="p-3 text-center min-w-[60px] text-xs font-bold text-gray-500 uppercase border-r border-gray-200 last:border-r-0">{m}</th>))}</tr></thead>
                                        <tbody className="divide-y divide-gray-100">{filteredData.length > 0 ? (filteredData.map((p) => {const dateObj = p.checkInTime ? (p.checkInTime.toDate ? p.checkInTime.toDate() : new Date(p.checkInTime)) : null; const monthIndex = dateObj && p.checkedIn ? dateObj.getMonth() : -1; const dayDate = dateObj ? dateObj.getDate() : ''; return (<tr key={p.id} className="hover:bg-indigo-50/30 transition"><td className="p-3 bg-white sticky left-0 z-10 border-r border-gray-200 group-hover:bg-indigo-50/30"><div className="font-bold text-gray-800 text-sm">{p.name}</div><div className="text-[10px] text-gray-400 font-mono">{p.regNum} • {p.kelas}</div></td>{months.map((m, i) => (<td key={i} className="p-2 text-center border-r border-gray-100 last:border-r-0">{i === monthIndex ? (<div className="flex flex-col items-center justify-center animate-fade-in"><div className="bg-emerald-100 text-emerald-600 p-1.5 rounded-full mb-1"><CheckCircle size={16} strokeWidth={3}/></div><span className="text-[10px] font-bold text-emerald-700 bg-emerald-50 px-1.5 rounded">Tgl {dayDate}</span></div>) : (<span className="text-gray-200 text-xl font-light">·</span>)}</td>))}</tr>);})) : (<tr><td colSpan="13" className="p-12 text-center text-gray-400 font-medium italic">Data tidak ditemukan untuk filter ini.</td></tr>)}</tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const StatsChart = ({ participants, sessions = [], sessionCheckins = [] }) => {
            const pieRef = React.useRef(null);
            const barRef = React.useRef(null);
            const trendRef = React.useRef(null); 
            const hourRef = React.useRef(null);
            const chartInstancePie = React.useRef(null);
            const chartInstanceBar = React.useRef(null);
            const chartInstanceTrend = React.useRef(null);
            const chartInstanceHour = React.useRef(null);

            React.useEffect(() => {
                if (!participants.length && !sessions.length) return;

                const total = participants.length;
                const present = participants.filter(p => p.checkedIn).length;
                const absent = total - present;

                const rawClasses = participants.map(p => p.kelas || 'Tanpa Keterangan');
                const classes = [...new Set(rawClasses)].sort();
                const dataPresent = classes.map(cls => participants.filter(p => (p.kelas || 'Tanpa Keterangan') === cls && p.checkedIn).length);
                const dataAbsent = classes.map(cls => participants.filter(p => (p.kelas || 'Tanpa Keterangan') === cls && !p.checkedIn).length);

                // === Per-sesi: total + rincian jenis kelamin ===
                const isMale = (k) => { const s = (k || '').toLowerCase(); return s.includes('laki'); };
                const isFemale = (k) => { const s = (k || '').toLowerCase(); return s.includes('perempuan'); };
                const sessionLabels = sessions.map((s, i) => s.name && s.name.length <= 18 ? s.name : `Sesi ${i + 1}`);
                const sessMale = sessions.map(s => sessionCheckins.filter(c => c.sessionId === s.id && isMale(c.kelas)).length);
                const sessFemale = sessions.map(s => sessionCheckins.filter(c => c.sessionId === s.id && isFemale(c.kelas)).length);
                const sessOther = sessions.map(s => sessionCheckins.filter(c => c.sessionId === s.id && !isMale(c.kelas) && !isFemale(c.kelas)).length);

                // === Pola jam check-in (semua sesi digabung) ===
                const hourCounts = {};
                sessionCheckins.forEach(c => {
                    if (!c.timestamp) return;
                    const d = c.timestamp.toDate ? c.timestamp.toDate() : new Date(c.timestamp);
                    if (isNaN(d)) return;
                    const h = d.getHours();
                    hourCounts[h] = (hourCounts[h] || 0) + 1;
                });
                const presentHours = Object.keys(hourCounts).map(Number).sort((a, b) => a - b);
                let hourLabels = [], hourData = [];
                if (presentHours.length) {
                    const minH = presentHours[0], maxH = presentHours[presentHours.length - 1];
                    for (let h = minH; h <= maxH; h++) {
                        hourLabels.push(String(h).padStart(2, '0') + ':00');
                        hourData.push(hourCounts[h] || 0);
                    }
                }

                if (pieRef.current) {
                    if (chartInstancePie.current) chartInstancePie.current.destroy();
                    chartInstancePie.current = new Chart(pieRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: ['Hadir', 'Belum Hadir'],
                            datasets: [{
                                data: [present, absent],
                                backgroundColor: ['#10b981', '#f43f5e'],
                                hoverOffset: 4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' }, title: { display: false } }, cutout: '70%' }
                    });
                }

                if (barRef.current) {
                    if (chartInstanceBar.current) chartInstanceBar.current.destroy();
                    chartInstanceBar.current = new Chart(barRef.current, {
                        type: 'bar',
                        data: {
                            labels: classes,
                            datasets: [
                                { label: 'Hadir', data: dataPresent, backgroundColor: '#4f46e5', borderRadius: 4, stack: 'Stack 0' },
                                { label: 'Belum', data: dataAbsent, backgroundColor: '#cbd5e1', borderRadius: 4, stack: 'Stack 0' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true } }, plugins: { legend: { position: 'top', align: 'end' } } }
                    });
                }

                if (trendRef.current) {
                    if (chartInstanceTrend.current) chartInstanceTrend.current.destroy();
                    chartInstanceTrend.current = new Chart(trendRef.current, {
                        type: 'bar',
                        data: {
                            labels: sessionLabels.length ? sessionLabels : ['Belum ada sesi'],
                            datasets: [
                                { label: 'Laki-laki', data: sessMale.length ? sessMale : [0], backgroundColor: '#4f46e5', borderRadius: 4, stack: 'g' },
                                { label: 'Perempuan', data: sessFemale.length ? sessFemale : [0], backgroundColor: '#ec4899', borderRadius: 4, stack: 'g' },
                                { label: 'Lainnya', data: sessOther.length ? sessOther : [0], backgroundColor: '#94a3b8', borderRadius: 4, stack: 'g' }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true, beginAtZero: true, ticks: { precision: 0 } } },
                            plugins: {
                                legend: { position: 'top', align: 'end' },
                                tooltip: { callbacks: { footer: (items) => 'Total: ' + items.reduce((sum, it) => sum + (it.parsed.y || 0), 0) } }
                            }
                        }
                    });
                }

                if (hourRef.current) {
                    if (chartInstanceHour.current) chartInstanceHour.current.destroy();
                    chartInstanceHour.current = new Chart(hourRef.current, {
                        type: 'bar',
                        data: {
                            labels: hourLabels.length ? hourLabels : ['Belum ada data'],
                            datasets: [{
                                label: 'Check-in',
                                data: hourData.length ? hourData : [0],
                                backgroundColor: '#06b6d4',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: { y: { beginAtZero: true, ticks: { precision: 0 }, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }

                return () => {
                    if (chartInstancePie.current) chartInstancePie.current.destroy();
                    if (chartInstanceBar.current) chartInstanceBar.current.destroy();
                    if (chartInstanceTrend.current) chartInstanceTrend.current.destroy();
                    if (chartInstanceHour.current) chartInstanceHour.current.destroy();
                };
            }, [participants, sessions, sessionCheckins]);

            return (
                <div className="space-y-6 mb-8">
                    <div className="glass-panel p-6 rounded-3xl shadow-lg border border-white/40"><div className="flex items-center gap-2 mb-4"><div className="bg-cyan-100 p-2 rounded-lg text-cyan-600"><TrendingUp size={20}/></div><h3 className="font-bold text-gray-700">Kehadiran per Sesi (Laki-laki / Perempuan)</h3></div><div className="h-64 w-full"><canvas ref={trendRef}></canvas></div></div>
                    <div className="glass-panel p-6 rounded-3xl shadow-lg border border-white/40"><div className="flex items-center gap-2 mb-4"><div className="bg-cyan-100 p-2 rounded-lg text-cyan-600"><CalendarDays size={20}/></div><h3 className="font-bold text-gray-700">Pola Jam Check-in</h3></div><div className="h-56 w-full"><canvas ref={hourRef}></canvas></div></div>
                    <div className="grid md:grid-cols-2 gap-6">
                        <div className="glass-panel p-6 rounded-3xl shadow-lg border border-white/40"><div className="flex items-center gap-2 mb-4"><div className="bg-emerald-100 p-2 rounded-lg text-emerald-600"><PieChart size={20}/></div><h3 className="font-bold text-gray-700">Persentase Saat Ini</h3></div><div className="h-56 relative"><canvas ref={pieRef}></canvas><div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"><span className="text-3xl font-black text-gray-800">{participants.length > 0 ? Math.round((participants.filter(p=>p.checkedIn).length / participants.length) * 100) : 0}%</span></div></div></div>
                        <div className="glass-panel p-6 rounded-3xl shadow-lg border border-white/40"><div className="flex items-center gap-2 mb-4"><div className="bg-indigo-100 p-2 rounded-lg text-indigo-600"><BarChart3 size={20}/></div><h3 className="font-bold text-gray-700">Analisa Per Jenis Kelamin</h3></div><div className="h-56"><canvas ref={barRef}></canvas></div></div>
                    </div>
                </div>
            );
        };

        const NavBar = ({ view, setView, isAdmin, isManager, isScanner }) => (
            <nav className="fixed bottom-0 left-0 w-full glass-nav shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50 md:top-0 md:bottom-auto md:border-b md:border-t-0 no-print">
                <div className="flex justify-around items-center h-20 max-w-4xl mx-auto px-4">
                    <button onClick={() => setView('home')} className={`flex flex-col items-center transition-all duration-300 ${view === 'home' ? 'text-primary scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                        <div className={`p-2 rounded-xl ${view === 'home' ? 'bg-indigo-50' : ''}`}><Users size={24} strokeWidth={view === 'home' ? 2.5 : 2} /></div><span className="text-[10px] font-medium mt-1">Beranda</span>
                    </button>
                    <button onClick={() => setView('my-qr')} className={`flex flex-col items-center transition-all duration-300 ${view === 'my-qr' ? 'text-primary scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                        <div className={`p-2 rounded-xl ${view === 'my-qr' ? 'bg-indigo-50' : ''}`}><QrCode size={24} strokeWidth={view === 'my-qr' ? 2.5 : 2} /></div><span className="text-[10px] font-medium mt-1">QR Saya</span>
                    </button>
                    {(isAdmin || isScanner || isManager) && (
                        <button onClick={() => setView('scanner')} className="group relative -top-6">
                            <div className="bg-gradient-to-tr from-primary to-secondary rounded-full p-4 shadow-lg shadow-indigo-500/40 border-4 border-white transform transition-transform group-hover:scale-105 group-active:scale-95"><Camera size={28} className="text-white" /></div>
                            <span className="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-500">Scan</span>
                        </button>
                    )}
                    <button onClick={() => setView('live')} className={`flex flex-col items-center transition-all duration-300 ${view === 'live' ? 'text-primary scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                        <div className={`p-2 rounded-xl ${view === 'live' ? 'bg-indigo-50' : ''}`}><CheckCircle size={24} strokeWidth={view === 'live' ? 2.5 : 2} /></div><span className="text-[10px] font-medium mt-1">Live</span>
                    </button>
                    {(isAdmin || isManager) && (
                        <button onClick={() => setView('admin')} className={`flex flex-col items-center transition-all duration-300 ${view === 'admin' ? 'text-primary scale-110' : 'text-gray-400 hover:text-gray-600'}`}>
                            <div className={`p-2 rounded-xl ${view === 'admin' ? 'bg-indigo-50' : ''}`}><Lock size={24} strokeWidth={view === 'admin' ? 2.5 : 2} /></div><span className="text-[10px] font-medium mt-1">{isAdmin ? 'Admin' : 'Manager'}</span>
                        </button>
                    )}
                </div>
            </nav>
        );

        const ScannerView = ({ scanInput, setScanInput, handleCheckIn, scanStatus, scannedName, isSessionOpen, isAdmin, isManager, isScanner, activeSessionName }) => {
            const videoRef = React.useRef(null);
            const scannerRef = React.useRef(null);
            const [cameraError, setCameraError] = React.useState(null);
            const [flashActive, setFlashActive] = React.useState(false); // Visual feedback
            const lastScanTimeRef = React.useRef(0);
            const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

            React.useEffect(() => {
                if (!isSessionOpen && !isAdmin && !isManager) return;
                
                if (!isSecure) { setCameraError("Wajib HTTPS!"); return; }
                const startScanner = async () => {
                    if (videoRef.current && !scannerRef.current) {
                        try {
                            scannerRef.current = new QrScanner(videoRef.current, (result) => {
                                const now = Date.now();
                                if (now - lastScanTimeRef.current > 1500) { // Sedikit delay agar tidak spam
                                    lastScanTimeRef.current = now;
                                    setFlashActive(true); // Trigger visual flash
                                    setTimeout(() => setFlashActive(false), 500);
                                    handleCheckIn(typeof result === 'string' ? result : result.data);
                                }
                            }, { 
                                // --- MAXIMIZED SCANNER CONFIGURATION ---
                                highlightScanRegion: false,
                                highlightCodeOutline: true,
                                preferredCamera: 'environment', 
                                maxScansPerSecond: 30, // Max speed
                                inversionMode: 'both', // Dark & Light mode
                                returnDetailedScanResult: true, // Akurasi lebih tinggi
                                // Hitung area scan agar FULL FRAME video (penting untuk laptop webcam)
                                calculateScanRegion: (video) => {
                                    return {
                                        x: 0,
                                        y: 0,
                                        width: video.videoWidth,
                                        height: video.videoHeight,
                                        downScaledWidth: video.videoWidth,
                                        downScaledHeight: video.videoHeight,
                                    };
                                }
                            });
                            await scannerRef.current.start();
                            setCameraError(null);
                        } catch (e) { console.error(e); setCameraError("Gagal akses kamera."); }
                    }
                };
                setTimeout(startScanner, 100);
                return () => { if (scannerRef.current) { scannerRef.current.stop(); scannerRef.current.destroy(); scannerRef.current = null; } };
            }, [isSessionOpen, isAdmin, isManager, isScanner, handleCheckIn]);

            if (!isSessionOpen && !isAdmin && !isManager) return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] p-6 text-center animate-fade-in">
                    <div className="w-32 h-32 bg-red-500/20 backdrop-blur-md rounded-full flex items-center justify-center mb-6 border-4 border-red-500 shadow-xl shadow-red-900/50"><Lock className="w-16 h-16 text-red-500" /></div>
                    <h2 className="text-3xl font-black text-white mb-2 drop-shadow-md">SESI DITUTUP</h2>
                    <p className="text-indigo-200 text-lg max-w-xs mx-auto">Sesi check-in saat ini sedang dinonaktifkan oleh panitia.</p>
                </div>
            );

            return (
                <div className="flex flex-col items-center justify-center min-h-[80vh] p-4 max-w-md mx-auto">
                    <h2 className="text-3xl font-extrabold mb-6 text-white tracking-tight drop-shadow-md">Scan Absensi</h2>
                    {activeSessionName ? (
                        <div className="mb-6 -mt-3 bg-emerald-500/20 border border-emerald-400/50 text-emerald-100 px-4 py-2 rounded-full text-sm font-bold backdrop-blur flex items-center gap-2"><CalendarDays size={16}/> Sesi: {activeSessionName}</div>
                    ) : (
                        <div className="mb-6 -mt-3 bg-amber-500/20 border border-amber-400/50 text-amber-100 px-4 py-2 rounded-full text-sm font-bold backdrop-blur flex items-center gap-2"><AlertCircle size={16}/> Belum ada sesi aktif — absensi umum</div>
                    )}
                    <div className="scan-container mb-8 shadow-2xl ring-4 ring-white/20">
                        {flashActive && <div className="scan-flash animate-flash bg-white absolute inset-0 z-50"></div>}
                        {cameraError ? <div className="absolute inset-0 flex flex-col items-center justify-center text-white p-6 text-center bg-gray-900 z-10"><CameraOff size={48} className="mb-4 text-red-400" /><p className="font-bold text-red-300 mb-2">Kamera Bermasalah</p><button onClick={() => window.location.reload()} className="bg-primary px-4 py-2 rounded-lg font-bold text-sm hover:bg-secondary transition">Coba Refresh</button></div> : <><video ref={videoRef} className="scan-video" playsInline muted autoPlay></video><div className="scan-overlay"></div><div className="absolute inset-0 pointer-events-none flex items-center justify-center"><div className="w-64 h-64 border-2 border-yellow-400/80 rounded-2xl relative shadow-[0_0_0_9999px_rgba(0,0,0,0.5)]"><div className="absolute top-0 left-0 w-6 h-6 border-l-4 border-t-4 border-yellow-500 rounded-tl-lg -ml-1 -mt-1"></div><div className="absolute top-0 right-0 w-6 h-6 border-r-4 border-t-4 border-yellow-500 rounded-tr-lg -mr-1 -mt-1"></div><div className="absolute bottom-0 left-0 w-6 h-6 border-l-4 border-b-4 border-yellow-500 rounded-bl-lg -ml-1 -mb-1"></div><div className="absolute bottom-0 right-0 w-6 h-6 border-r-4 border-b-4 border-yellow-500 rounded-br-lg -mr-1 -mb-1"></div></div><p className="absolute bottom-12 text-white text-xs bg-black/50 backdrop-blur px-3 py-1.5 rounded-full font-medium tracking-wide">ARAHKAN QR CODE KE KOTAK</p></div></>}
                    </div>
                    <div className="w-full mb-6 glass-panel p-2 rounded-2xl flex shadow-lg">
                        <input type="text" placeholder="Input Manual ID..." value={scanInput} onChange={(e) => setScanInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleCheckIn(scanInput); }} className="flex-1 bg-transparent p-3 outline-none text-gray-700 placeholder-gray-400 font-medium" />
                        <button onClick={() => handleCheckIn(scanInput)} className="bg-gradient-to-r from-primary to-secondary text-white px-6 rounded-xl font-bold shadow-md hover:shadow-lg transition active:scale-95">Check-In</button>
                    </div>
                    {scanStatus === 'success' && <div className="w-full bg-green-100/90 backdrop-blur border border-green-400 text-green-800 px-4 py-4 rounded-2xl flex items-center gap-4 mb-4 animate-bounce-short shadow-lg"><div className="bg-green-500 p-2 rounded-full text-white"><CheckCircle className="w-6 h-6" /></div><div><p className="font-bold text-lg">Berhasil Masuk!</p><p className="text-sm opacity-80">{scannedName}</p></div></div>}
                    {scanStatus === 'duplicate' && <div className="w-full bg-yellow-100/90 backdrop-blur border border-yellow-400 text-yellow-800 px-4 py-4 rounded-2xl flex items-center gap-4 mb-4 shadow-lg"><div className="bg-yellow-500 p-2 rounded-full text-white"><AlertCircle className="w-6 h-6" /></div><div><p className="font-bold text-lg">Sudah Hadir</p><p className="text-sm opacity-80">{scannedName} sudah ada.</p></div></div>}
                    {scanStatus === 'error' && <div className="w-full bg-red-100/90 backdrop-blur border border-red-400 text-red-800 px-4 py-4 rounded-2xl flex items-center gap-4 mb-4 shadow-lg"><div className="bg-red-500 p-2 rounded-full text-white"><AlertTriangle className="w-6 h-6" /></div><div><p className="font-bold text-lg">Gagal</p><p className="text-sm opacity-80">Data tidak ditemukan.</p></div></div>}
                    {scanStatus === 'closed' && <div className="w-full bg-red-100/90 backdrop-blur border border-red-400 text-red-800 px-4 py-4 rounded-2xl flex items-center gap-4 mb-4 shadow-lg"><div className="bg-red-600 p-2 rounded-full text-white"><Lock className="w-6 h-6" /></div><div><p className="font-bold text-lg">Sesi Ditutup</p><p className="text-sm opacity-80">Check-in sedang tidak aktif.</p></div></div>}
                </div>
            );
        };

        function App() {
            const [user, setUser] = React.useState(null);
            const [participants, setParticipants] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [view, setView] = React.useState('home');
            
            // STATES FOR ROLES
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [isManager, setIsManager] = React.useState(false);
            const [isScanner, setIsScanner] = React.useState(false);
            
            const [loginEmail, setLoginEmail] = React.useState('');
            const [loginPassword, setLoginPassword] = React.useState('');
            const [loginError, setLoginError] = React.useState('');
            const [loggingIn, setLoggingIn] = React.useState(false);
            const [showLoginModal, setShowLoginModal] = React.useState(false);
            const [isSessionOpen, setIsSessionOpen] = React.useState(false);
            
            const [liveTab, setLiveTab] = React.useState('present');

            const fileInputRef = React.useRef(null);
            const [importing, setImporting] = React.useState(false);
            const [importProgress, setImportProgress] = React.useState("");
            
            const [newName, setNewName] = React.useState('');
            const [newRegNum, setNewRegNum] = React.useState('');
            const [newClass, setNewClass] = React.useState('');
            const [newCategory, setNewCategory] = React.useState('');

            const [adminSearch, setAdminSearch] = React.useState('');
            const [myRegLogin, setMyRegLogin] = React.useState('');
            const [myParticipantData, setMyParticipantData] = React.useState(null);
            const [searchResults, setSearchResults] = React.useState([]); 
            const [scanInput, setScanInput] = React.useState('');
            const [scanStatus, setScanStatus] = React.useState('idle'); 
            const [scannedName, setScannedName] = React.useState('');
            const [showPrintModal, setShowPrintModal] = React.useState(false);
            
            const [showAnalysisModal, setShowAnalysisModal] = React.useState(false);

            // === RETREAT: sesi, check-in per sesi, catatan ===
            const [sessions, setSessions] = React.useState([]);
            const [activeSessionId, setActiveSessionId] = React.useState('');
            const [sessionCheckins, setSessionCheckins] = React.useState([]);
            const [newSessionName, setNewSessionName] = React.useState('');
            const [newSessionDay, setNewSessionDay] = React.useState('11 Juli 2026');
            const [newSessionStart, setNewSessionStart] = React.useState('');
            const [newSessionEnd, setNewSessionEnd] = React.useState('');
            const [attnSessionId, setAttnSessionId] = React.useState('');
            const [attnSearch, setAttnSearch] = React.useState('');
            const [myNotes, setMyNotes] = React.useState([]);
            const [noteDrafts, setNoteDrafts] = React.useState({});
            const [savingNoteId, setSavingNoteId] = React.useState('');

            React.useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (u) => {
                    setUser(u);
                    setLoading(false);
                    // Jika user adalah akun email/password (bukan anonim), baca peran dari custom claims
                    if (u && !u.isAnonymous) {
                        try {
                            const tokenResult = await getIdTokenResult(u, true);
                            const claims = tokenResult.claims || {};
                            const admin = claims.admin === true;
                            const manager = claims.manager === true;
                            const scanner = claims.scanner === true;
                            setIsAdmin(admin);
                            setIsManager(admin || manager);
                            setIsScanner(admin || manager || scanner);
                            // Arahkan ke view sesuai peran tertinggi

                            setShowLoginModal(false);
                            setLoginError('');
                        } catch (e) {
                            console.error("Gagal membaca peran:", e);
                        }
                    } else {
                        // Anonim / belum login email: tidak punya peran

                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const lines = ev.target.result.split(/\r\n|\n/).filter(line => line.trim() !== "");
                    const existingRegs = new Set(participants.map(p => p.regNum));
                    const newDocs = [];
                    for (let line of lines) {
                        const cols = line.split(/[;,]/);
                        let rawName = cols[0]?.replace(/^"|"$/g, '').trim();
                        if (!rawName || rawName.toLowerCase().includes('nama')) continue;
                        let regNum;
                        do { regNum = `GSM-${Math.floor(1000 + Math.random() * 9000)}`; } while (existingRegs.has(regNum));
                        existingRegs.add(regNum); 
                        newDocs.push({ name: rawName, category: cols[1]?.replace(/^"|"$/g, '').trim() || "GSM", kelas: cols[2]?.replace(/^"|"$/g, '').trim() || "-", regNum: regNum, checkedIn: false, checkInTime: null });

                    if (newDocs.length === 0) { alert("Tidak ada data baru."); setImporting(false); return; }
                    const BATCH_SIZE = 450; const chunks = [];
                    for (let i = 0; i < newDocs.length; i += BATCH_SIZE) { chunks.push(newDocs.slice(i, i + BATCH_SIZE)); }
